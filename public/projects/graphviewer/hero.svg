<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="GraphViewer antenna polar pattern placeholder">
  <defs>
    <linearGradient id="bg-gv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#080808"/>
      <stop offset="1" stop-color="#141210"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg-gv)"/>

  <!-- Label -->
  <text x="100" y="90" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#ece7df" fill-opacity="0.55" letter-spacing="3">ANTENNA PATTERN · E-PLANE · 2.45 GHz</text>
  <text x="1500" y="90" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#ece7df" fill-opacity="0.55" letter-spacing="3">MAX · +4.2 dBi · θ=12°</text>

  <!-- Polar plot -->
  <g transform="translate(500,520)">
    <!-- radial rings -->
    <g fill="none" stroke="#ece7df" stroke-opacity="0.12">
      <circle r="90"/>
      <circle r="180"/>
      <circle r="270"/>
      <circle r="360"/>
    </g>
    <!-- radial labels -->
    <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ece7df" fill-opacity="0.4">
      <text x="4" y="-88">-10 dB</text>
      <text x="4" y="-178">-20 dB</text>
      <text x="4" y="-268">-30 dB</text>
      <text x="4" y="-358">-40 dB</text>
    </g>
    <!-- angular ticks -->
    <g stroke="#ece7df" stroke-opacity="0.12">
      <line x1="0" y1="-370" x2="0" y2="370"/>
      <line x1="-370" y1="0" x2="370" y2="0"/>
      <line x1="-262" y1="-262" x2="262" y2="262"/>
      <line x1="262" y1="-262" x2="-262" y2="262"/>
    </g>
    <!-- pattern lobe (approximate cardioid with sidelobes) -->
    <path d="M 0 -350
             C 120 -340, 220 -280, 260 -180
             C 300 -60, 280 60, 200 140
             C 120 220, 40 230, 0 240
             C -40 230, -120 220, -200 140
             C -280 60, -300 -60, -260 -180
             C -220 -280, -120 -340, 0 -350 Z"
          fill="#e23614" fill-opacity="0.1" stroke="#e23614" stroke-width="2"/>
    <!-- main beam marker -->
    <circle cx="60" cy="-340" r="6" fill="#e23614"/>
    <!-- center -->
    <circle r="3" fill="#ece7df" fill-opacity="0.6"/>
    <!-- angular labels -->
    <g font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#ece7df" fill-opacity="0.55">
      <text x="0" y="-388" text-anchor="middle">0°</text>
      <text x="388" y="5">90°</text>
      <text x="0" y="400" text-anchor="middle">180°</text>
      <text x="-388" y="5" text-anchor="end">270°</text>
    </g>
  </g>

  <!-- Right-side file tree / data block -->
  <g transform="translate(1040,180)" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#ece7df">
    <text x="0" y="0" fill-opacity="0.55" letter-spacing="3">LOAD · antenna_2g45.txt</text>
    <g transform="translate(0,40)" fill-opacity="0.85">
      <text x="0" y="0"> 0°   -42.1 dB</text>
      <text x="0" y="24"> 10°  -18.2 dB</text>
      <text x="0" y="48"> 20°   -4.3 dB</text>
      <text x="0" y="72"> 30°   +2.1 dB</text>
      <text x="0" y="96"> 40°   +3.8 dB</text>
      <text x="0" y="120"> 50°   +2.0 dB</text>
      <text x="0" y="144"> 60°   -6.4 dB</text>
      <text x="0" y="168"> 70°  -14.1 dB</text>
      <text x="0" y="192"> 80°  -22.7 dB</text>
      <text x="0" y="216"> 90°  -30.8 dB</text>
      <text x="0" y="240">100°  -33.2 dB</text>
      <text x="0" y="264">110°  -28.9 dB</text>
      <text x="0" y="288">120°  -21.4 dB</text>
    </g>
    <text x="0" y="360" fill-opacity="0.55" letter-spacing="3">UPLOAD · PARSE · RENDER</text>
    <text x="0" y="392" fill="#e23614">→ chart.js / polar view</text>
  </g>
</svg>
