<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Two-pass assembler placeholder">
  <defs>
    <linearGradient id="bgasm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#080808"/>
      <stop offset="1" stop-color="#141413"/>
    </linearGradient>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#e23614"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="url(#bgasm)"/>

  <g font-family="ui-monospace, Menlo, monospace" font-size="22" fill="#ece7df" letter-spacing="1.5">
    <text x="100" y="90" font-size="14" fill-opacity="0.55" letter-spacing="3">SOURCE . as</text>
    <text x="100" y="160">MAIN:   mov   r3, r7</text>
    <text x="100" y="195" fill-opacity="0.85">        jmp   LOOP</text>
    <text x="100" y="230" fill-opacity="0.85">LOOP:   prn   -5</text>
    <text x="100" y="265" fill-opacity="0.85">        inc   r2</text>
    <text x="100" y="300" fill-opacity="0.85">        cmp   r2, 10</text>
    <text x="100" y="335" fill-opacity="0.85">        bne   LOOP</text>
    <text x="100" y="370" fill-opacity="0.85">        stop</text>
    <text x="100" y="420" fill-opacity="0.55" font-size="14" letter-spacing="3">SYMBOL TABLE</text>
    <text x="100" y="460">MAIN    0100    code</text>
    <text x="100" y="490">LOOP    0104    code</text>
    <text x="100" y="520">STR     0200    data</text>
  </g>

  <g stroke="#e23614" stroke-width="2" fill="none">
    <path d="M720 300 L900 300" marker-end="url(#arr2)"/>
  </g>
  <text x="810" y="275" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#e23614" letter-spacing="3" text-anchor="middle">pass 2</text>

  <g font-family="ui-monospace, Menlo, monospace" font-size="18" fill="#ece7df" letter-spacing="1.5">
    <text x="940" y="90" font-size="14" fill-opacity="0.55" letter-spacing="3">OUTPUT . ob . BASE 4</text>
    <text x="940" y="160">0100  0000101032</text>
    <text x="940" y="195">0101  0001211300</text>
    <text x="940" y="230">0102  0021300103</text>
    <text x="940" y="265">0103  0000000000</text>
    <text x="940" y="300">0104  0013210020</text>
    <text x="940" y="335">0105  0020113002</text>
    <text x="940" y="370">0106  0100210032</text>
    <text x="940" y="405">0107  0023110000</text>
    <text x="940" y="440">0108  0011200003</text>
    <text x="940" y="475">0109  0000001230</text>
  </g>

  <rect x="100" y="820" width="1400" height="70" fill="none" stroke="#ece7df" stroke-opacity="0.15"/>
  <g font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#ece7df" fill-opacity="0.7" letter-spacing="3">
    <text x="120" y="862">PASS 1 : OK   .   SYMBOLS : 3 / 64   .   ERRORS : 0</text>
    <text x="1480" y="862" text-anchor="end" fill="#e23614">ANSI C90</text>
  </g>
</svg>
