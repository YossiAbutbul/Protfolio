<svg xmlns="http://www.w3.org/2000/svg" width="1919" height="1079" viewBox="0 0 1919 1079">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&amp;family=Heebo:wght@400;700&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .heb  { font-family: 'Heebo', 'Arial Hebrew', sans-serif; }
    </style>

    <radialGradient id="crt" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0d1410"/>
      <stop offset="70%" stop-color="#070a08"/>
      <stop offset="100%" stop-color="#020403"/>
    </radialGradient>

    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#171717"/>
    </linearGradient>

    <linearGradient id="row" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1a14"/>
      <stop offset="100%" stop-color="#0a1310"/>
    </linearGradient>

    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000" opacity="0.18"/>
    </pattern>

    <filter id="phosphor">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer bezel -->
  <rect width="1919" height="1079" fill="url(#bezel)"/>

  <!-- CRT screen area -->
  <rect x="80" y="80" width="1759" height="919" rx="40" fill="url(#crt)" stroke="#222" stroke-width="2"/>

  <!-- Vignette -->
  <rect x="80" y="80" width="1759" height="919" rx="40" fill="url(#crt)" opacity="0.6"/>

  <!-- Top status bar (lower-third style) -->
  <g transform="translate(120,120)">
    <rect width="1679" height="44" rx="4" fill="#0a120e" stroke="#1f2a23" stroke-width="1"/>
    <circle cx="22" cy="22" r="6" fill="#7dd3a7" filter="url(#phosphor)"/>
    <text x="44" y="28" class="mono" font-size="13" fill="#7dd3a7" letter-spacing="0.18em">CH 04 · LIVE</text>
    <text x="220" y="28" class="mono" font-size="13" fill="#4a6b58" letter-spacing="0.18em">HAPARLAMENTOR · PHRASE → EPISODE</text>
    <text x="1640" y="28" class="mono" font-size="13" fill="#4a6b58" text-anchor="end" letter-spacing="0.18em">REC</text>
    <circle cx="1655" cy="22" r="5" fill="#d96565" filter="url(#phosphor)"/>
  </g>

  <!-- Logo / title -->
  <g transform="translate(959,260)" text-anchor="middle">
    <text class="heb" font-size="84" font-weight="700" fill="#a8e6c4" filter="url(#softglow)" direction="rtl">הפרלמנטור</text>
    <text y="44" class="mono" font-size="14" fill="#5a7d6a" letter-spacing="0.4em">PHRASE-TO-EPISODE SEARCH</text>
  </g>

  <!-- Search bar -->
  <g transform="translate(360,380)">
    <rect width="1199" height="86" rx="6" fill="#0a120e" stroke="#2a4035" stroke-width="2"/>
    <rect x="0" y="0" width="1199" height="86" rx="6" fill="none" stroke="#7dd3a7" stroke-width="1" opacity="0.35" filter="url(#phosphor)"/>
    <text x="40" y="55" class="mono" font-size="22" fill="#5a7d6a" letter-spacing="0.2em">CHANNEL INPUT</text>
    <line x1="290" y1="20" x2="290" y2="66" stroke="#1f2a23" stroke-width="1"/>
    <text x="1159" y="55" class="heb" font-size="32" fill="#a8e6c4" filter="url(#phosphor)" direction="rtl" text-anchor="end">אני לא מבין מה אתה רוצה ממני</text>
    <rect x="320" y="32" width="14" height="22" fill="#a8e6c4" filter="url(#phosphor)">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Results header -->
  <g transform="translate(120,510)">
    <text class="mono" font-size="13" fill="#4a6b58" letter-spacing="0.3em">3 MATCHES · TV GUIDE</text>
    <line x1="0" y1="14" x2="1679" y2="14" stroke="#1f2a23" stroke-width="1"/>
  </g>

  <!-- Result row 1 -->
  <g transform="translate(120,540)">
    <rect width="1679" height="120" rx="4" fill="url(#row)" stroke="#1f2a23" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="120" fill="#7dd3a7" filter="url(#phosphor)"/>
    <text x="32" y="38" class="mono" font-size="14" fill="#7dd3a7" letter-spacing="0.18em">S02 · E14 · 12:43</text>
    <text x="32" y="64" class="mono" font-size="12" fill="#4a6b58" letter-spacing="0.15em">SHIMSHON / שמשון</text>
    <text x="1647" y="38" class="heb" font-size="20" fill="#a8e6c4" direction="rtl" text-anchor="end" filter="url(#phosphor)">אני לא מבין מה אתה רוצה ממני</text>
    <text x="1647" y="68" class="heb" font-size="15" fill="#6a9080" direction="rtl" text-anchor="end" opacity="0.7">— תגיד את זה שוב, אבל לאט</text>
    <text x="1647" y="92" class="heb" font-size="15" fill="#6a9080" direction="rtl" text-anchor="end" opacity="0.7">— מה אמרתי? אני לא מבין מה אתה רוצה ממני</text>
    <text x="32" y="100" class="mono" font-size="11" fill="#5a7d6a" letter-spacing="0.2em">↗ MAKO · jump 12:43</text>
  </g>

  <!-- Result row 2 -->
  <g transform="translate(120,680)">
    <rect width="1679" height="120" rx="4" fill="url(#row)" stroke="#1f2a23" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="120" fill="#7dd3a7" filter="url(#phosphor)" opacity="0.7"/>
    <text x="32" y="38" class="mono" font-size="14" fill="#7dd3a7" letter-spacing="0.18em" opacity="0.85">S03 · E07 · 04:18</text>
    <text x="32" y="64" class="mono" font-size="12" fill="#4a6b58" letter-spacing="0.15em">DUDU / דודו</text>
    <text x="1647" y="38" class="heb" font-size="20" fill="#9dd0b8" direction="rtl" text-anchor="end" filter="url(#phosphor)">לא מבין מה רוצים ממני פה</text>
    <text x="1647" y="68" class="heb" font-size="15" fill="#6a9080" direction="rtl" text-anchor="end" opacity="0.7">— נו תגיד כבר משהו</text>
    <text x="1647" y="92" class="heb" font-size="15" fill="#6a9080" direction="rtl" text-anchor="end" opacity="0.7">— מה אני אגיד? לא מבין מה רוצים ממני פה</text>
    <text x="32" y="100" class="mono" font-size="11" fill="#5a7d6a" letter-spacing="0.2em">↗ MAKO · jump 04:18</text>
  </g>

  <!-- Result row 3 -->
  <g transform="translate(120,820)">
    <rect width="1679" height="120" rx="4" fill="url(#row)" stroke="#1f2a23" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="120" fill="#7dd3a7" filter="url(#phosphor)" opacity="0.45"/>
    <text x="32" y="38" class="mono" font-size="14" fill="#7dd3a7" letter-spacing="0.18em" opacity="0.7">S01 · E22 · 18:02</text>
    <text x="32" y="64" class="mono" font-size="12" fill="#4a6b58" letter-spacing="0.15em">SHIMSHON / שמשון</text>
    <text x="1647" y="38" class="heb" font-size="20" fill="#88baa0" direction="rtl" text-anchor="end" filter="url(#phosphor)">אני לא מבין אותך, מה אתה רוצה</text>
    <text x="1647" y="68" class="heb" font-size="15" fill="#6a9080" direction="rtl" text-anchor="end" opacity="0.7">— תקשיב טוב</text>
    <text x="1647" y="92" class="heb" font-size="15" fill="#6a9080" direction="rtl" text-anchor="end" opacity="0.7">— אני לא מבין אותך, מה אתה רוצה ממני עכשיו</text>
    <text x="32" y="100" class="mono" font-size="11" fill="#5a7d6a" letter-spacing="0.2em">↗ MAKO · jump 18:02</text>
  </g>

  <!-- Scanlines overlay -->
  <rect x="80" y="80" width="1759" height="919" rx="40" fill="url(#scanlines)" pointer-events="none"/>

  <!-- Curvature highlight -->
  <ellipse cx="600" cy="250" rx="700" ry="160" fill="#ffffff" opacity="0.02"/>
</svg>
