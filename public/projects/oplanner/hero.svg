<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="OPlanner placeholder">
  <defs>
    <linearGradient id="bg-op" x1="0" y1="0" x2="0" y2="1">
