<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Pipeline CPU diagram placeholder">
  <defs>
    <linearGradient id="bgpcpu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#080808"/>
      <stop offset="1" stop-color="#141413"/>
    </linearGradient>
    <marker id="arrPC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#e23614"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="url(#bgpcpu)"/>

  <g font-family="ui-monospace, Menlo, monospace" fill="#ece7df">
    <text x="60" y="62" font-size="22" letter-spacing="2">Pipeline CPU Diagram</text>
    <text x="60" y="86" font-size="11" fill="#ece7df" fill-opacity="0.45" letter-spacing="3">RV32 . 5-STAGE</text>
    <g transform="translate(1340, 42)">
      <rect width="200" height="32" rx="2" fill="none" stroke="#e23614" stroke-width="1.2"/>
      <circle cx="18" cy="16" r="4" fill="#e23614"/>
      <text x="34" y="20" font-size="12" fill="#e23614" letter-spacing="3">WORK IN PROGRESS</text>
    </g>
  </g>

  <g font-family="ui-monospace, Menlo, monospace" fill="#ece7df" font-size="18" text-anchor="middle" letter-spacing="3">
    <text x="200" y="135">IF</text>
    <text x="500" y="135">ID</text>
    <text x="800" y="135">EX</text>
    <text x="1100" y="135">MEM</text>
    <text x="1400" y="135">WB</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ece7df" fill-opacity="0.4" text-anchor="middle" letter-spacing="2">
    <text x="200" y="158">fetch</text>
    <text x="500" y="158">decode</text>
    <text x="800" y="158">execute</text>
    <text x="1100" y="158">memory</text>
    <text x="1400" y="158">writeback</text>
  </g>

  <g fill="#ece7df" fill-opacity="0.04" stroke="#ece7df" stroke-opacity="0.18" stroke-width="1">
    <rect x="335" y="200" width="20" height="640" rx="2"/>
    <rect x="635" y="200" width="20" height="640" rx="2"/>
    <rect x="935" y="200" width="20" height="640" rx="2"/>
    <rect x="1235" y="200" width="20" height="640" rx="2"/>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ece7df" fill-opacity="0.5" letter-spacing="2" writing-mode="tb">
    <text x="345" y="220">IF/ID</text>
    <text x="645" y="220">ID/EX</text>
    <text x="945" y="220">EX/MEM</text>
    <text x="1245" y="220">MEM/WB</text>
  </g>

  <g>
    <ellipse cx="500" cy="240" rx="120" ry="32" fill="#0f0f0f" stroke="#ece7df" stroke-opacity="0.45" stroke-width="1.2"/>
    <text x="500" y="237" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ece7df" text-anchor="middle">Hazard</text>
    <text x="500" y="254" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ece7df" text-anchor="middle">Detection Unit</text>
  </g>

  <g>
    <rect x="100" y="380" width="80" height="80" fill="#0f0f0f" stroke="#ece7df" stroke-opacity="0.4" stroke-width="1.2"/>
    <text x="140" y="425" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ece7df" text-anchor="middle">PC</text>
    <rect x="220" y="380" width="120" height="160" fill="#0f0f0f" stroke="#ece7df" stroke-opacity="0.4" stroke-width="1.2"/>
    <text x="280" y="455" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ece7df" text-anchor="middle">Instruction</text>
    <text x="280" y="473" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ece7df" text-anchor="middle">Memory</text>
    <text x="120" y="490" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#e23614" letter-spacing="1">0x80000180</text>
  </g>

  <g>
    <rect x="400" y="380" width="200" height="160" fill="#0f0f0f" stroke="#ece7df" stroke-opacity="0.4" stroke-width="1.2"/>
    <text x="500" y="455" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ece7df" text-anchor="middle">Registers</text>
    <text x="500" y="473" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ece7df" fill-opacity="0.55" text-anchor="middle">read $rs / $rt</text>

    <rect x="400" y="600" width="200" height="80" fill="#0f0f0f" stroke="#ece7df" stroke-opacity="0.4" stroke-width="1.2"/>
    <text x="500" y="645" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ece7df" text-anchor="middle">Sign Extend</text>
  </g>

  <g>
    <polygon points="700,400 800,360 800,500 700,460 700,400" fill="#0f0f0f" stroke="#ece7df" stroke-opacity="0.45" stroke-width="1.2"/>
    <polygon points="800,360 880,420 800,500 800,360" fill="#0f0f0f" stroke="#ece7df" stroke-opacity="0.45" stroke-width="1.2"/>
    <text x="780" y="436" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#ece7df" text-anchor="middle">ALU</text>
  </g>

  <g>
    <rect x="1000" y="380" width="200" height="160" fill="#0f0f0f" stroke="#ece7df" stroke-opacity="0.4" stroke-width="1.2"/>
    <text x="1100" y="453" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ece7df" text-anchor="middle">Data</text>
    <text x="1100" y="471" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ece7df" text-anchor="middle">Memory</text>
  </g>

  <g>
    <rect x="1320" y="400" width="160" height="120" fill="#0f0f0f" stroke="#ece7df" stroke-opacity="0.4" stroke-width="1.2"/>
    <text x="1400" y="455" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ece7df" text-anchor="middle">Write-back</text>
    <text x="1400" y="473" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ece7df" fill-opacity="0.55" text-anchor="middle">to regfile</text>
  </g>

  <g stroke="#e23614" stroke-width="1.4" fill="none" stroke-opacity="0.85">
    <path d="M180 420 L220 420" marker-end="url(#arrPC)"/>
    <path d="M340 460 L335 460"/>
    <path d="M355 460 L400 460" marker-end="url(#arrPC)"/>
    <path d="M600 460 L635 460"/>
    <path d="M655 460 L700 430" marker-end="url(#arrPC)"/>
    <path d="M600 640 L700 470" marker-end="url(#arrPC)"/>
    <path d="M880 420 L935 420"/>
    <path d="M955 420 L1000 420" marker-end="url(#arrPC)"/>
    <path d="M1200 460 L1235 460"/>
    <path d="M1255 460 L1320 460" marker-end="url(#arrPC)"/>
    <path d="M1480 520 C 1540 700, 380 800, 400 540" stroke-dasharray="4 4" opacity="0.5"/>
  </g>

  <g>
    <ellipse cx="800" cy="780" rx="140" ry="34" fill="#0f0f0f" stroke="#ece7df" stroke-opacity="0.45" stroke-width="1.2"/>
    <text x="800" y="776" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ece7df" text-anchor="middle">Forwarding</text>
    <text x="800" y="794" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ece7df" text-anchor="middle">Unit</text>
  </g>

  <g stroke="#e23614" stroke-width="1" fill="none" stroke-opacity="0.45" stroke-dasharray="4 4">
    <path d="M780 500 L800 746"/>
    <path d="M1100 540 L820 770"/>
    <path d="M730 770 L500 540"/>
    <path d="M460 270 L380 380"/>
    <path d="M540 270 L580 380"/>
  </g>

  <rect x="60" y="900" width="1480" height="56" fill="none" stroke="#ece7df" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#ece7df" fill-opacity="0.65" letter-spacing="2">
    <text x="80" y="934">PROGRAM:  add $1, $2, $3</text>
    <text x="500" y="934">HAZARDS: 0</text>
    <text x="720" y="934">STALLS: 0</text>
    <text x="900" y="934">FORWARDS: 0</text>
    <text x="1520" y="934" text-anchor="end" fill="#e23614">CYCLE 0x07</text>
  </g>
</svg>
