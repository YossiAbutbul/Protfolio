<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="Mini-Circuits power sensor wrapper placeholder">
  <defs>
    <linearGradient id="bg-mc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#080808"/>
      <stop offset="1" stop-color="#171412"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg-mc)"/>

  <!-- Grid -->
  <g stroke="#ece7df" stroke-opacity="0.07">
    <path d="M100 180 H1500 M100 340 H1500 M100 500 H1500 M100 660 H1500 M100 820 H1500"/>
    <path d="M300 120 V880 M500 120 V880 M700 120 V880 M900 120 V880 M1100 120 V880 M1300 120 V880"/>
  </g>

  <!-- Axis -->
  <g stroke="#ece7df" stroke-opacity="0.3">
    <path d="M100 820 L1500 820"/>
    <path d="M100 120 L100 820"/>
  </g>

  <!-- Power-vs-time ramp + burst -->
  <path d="M100 810 L220 805 L380 790 L520 760 L680 680 L820 500 L880 290 L920 250 L1020 260 L1120 450 L1240 660 L1360 790 L1500 805"
        fill="none" stroke="#e23614" stroke-width="3"/>

  <!-- Sample ticks -->
  <g fill="#ece7df" fill-opacity="0.6">
    <circle cx="220" cy="805" r="3"/>
    <circle cx="380" cy="790" r="3"/>
    <circle cx="520" cy="760" r="3"/>
    <circle cx="680" cy="680" r="3"/>
    <circle cx="820" cy="500" r="3"/>
    <circle cx="900" cy="270" r="3"/>
    <circle cx="1020" cy="260" r="3"/>
    <circle cx="1120" cy="450" r="3"/>
    <circle cx="1240" cy="660" r="3"/>
    <circle cx="1360" cy="790" r="3"/>
  </g>

  <!-- Peak marker -->
  <g stroke="#e23614" stroke-width="1.5" fill="none">
    <line x1="900" y1="270" x2="900" y2="120"/>
    <circle cx="900" cy="270" r="7"/>
  </g>
  <text x="920" y="160" font-family="ui-monospace, Menlo, monospace" font-size="16" fill="#e23614" letter-spacing="2">PEAK  +12.4 dBm</text>

  <!-- Axis labels -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#ece7df" fill-opacity="0.55" letter-spacing="2">
    <text x="100" y="90">POWER-vs-TIME · BURST AVG · 100 ms WINDOW</text>
    <text x="1480" y="90" text-anchor="end">PN: PWR-6GHS+ · SN 2024A021</text>
    <text x="1480" y="860" text-anchor="end">t / ms</text>
    <text x="100" y="870">0</text>
    <text x="1480" y="870" text-anchor="end">100</text>
  </g>

  <!-- Code overlay, bottom-left -->
  <g transform="translate(100,880)" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#ece7df" fill-opacity="0.75" letter-spacing="0.5">
    <text x="0" y="0">with PowerSensor(sn="2024A021") as ps:  # python wrapper → .NET DLL</text>
    <text x="0" y="22">    print(ps.peak(window_ms=100))  → +12.4 dBm</text>
  </g>
</svg>
