  </defs>
  <rect width="1600" height="1000" fill="url(#bg-rg)"/>
  <!-- Grid -->
  <g stroke="#ece7df" stroke-opacity="0.08" stroke-width="1">
    <path d="M0 125 H1600 M0 250 H1600 M0 375 H1600 M0 500 H1600 M0 625 H1600 M0 750 H1600 M0 875 H1600"/>
    <path d="M100 0 V1000 M300 0 V1000 M500 0 V1000 M700 0 V1000 M900 0 V1000 M1100 0 V1000 M1300 0 V1000 M1500 0 V1000"/>
  </g>
  <!-- Axes -->
  <g stroke="#ece7df" stroke-opacity="0.35" stroke-width="1">
    <path d="M80 920 L1520 920"/>
    <path d="M80 80 L80 920"/>
  </g>
  <!-- Waveform / spectrum curve -->
  <path d="M80 820
           C 200 780, 260 620, 360 640
           S 500 820, 600 720
           S 760 420, 880 520
           S 1080 200, 1200 360
