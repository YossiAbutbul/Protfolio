<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="RF Report Generator hero placeholder">
  <defs>
    <linearGradient id="bg-rg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1a1413"/>
    </linearGradient>
    <linearGradient id="plot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e23614" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#e23614" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#e23614" stop-opacity="0"/>
