    <text x="80" y="60">SPECTRUM · SWEEP 04 · +7 dBm · 2.40–2.48 GHz</text>
    <text x="1360" y="60" text-anchor="end">REPORT 12 · 2026-04-14</text>
    <text x="80" y="970">FREQ</text>
    <text x="1520" y="970" text-anchor="end">MHz</text>
  </g>
  <!-- Corner tick -->
  <g stroke="#e23614" stroke-width="1" fill="none">
